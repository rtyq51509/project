<!DOCTYPE html>
<html>
<head>
<title>EventGO | Moments That Matter</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Stylish Logo Font -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

/* ========= COLOR PALETTE =========
Deep Teal: #0F4C5C
Peach: #FFB4A2
Soft Mint: #B8F2E6
Cream: #FAF3DD
Coral: #F28482
=================================== */

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#FAF3DD;
}

/* HEADER */
header{
    background:#0F4C5C;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-family:'Pacifico', cursive;
    font-size:32px;
    color:#FFB4A2;
}

nav a{
    text-decoration:none;
    background:#B8F2E6;
    padding:10px 20px;
    margin-left:10px;
    border-radius:30px;
    color:#0F4C5C;
    font-weight:bold;
}

nav a:hover{
    background:#FFB4A2;
}

/* HERO CAROUSEL */
.carousel{
    overflow:hidden;
    height:350px;
    position:relative;
}

.slides{
    display:flex;
    width:300%;
    animation:slide 12s infinite;
}

.slides img{
    width:100%;
    height:350px;
    object-fit:cover;
}

@keyframes slide{
    0%{margin-left:0%;}
    33%{margin-left:0%;}
    40%{margin-left:-100%;}
    66%{margin-left:-100%;}
    73%{margin-left:-200%;}
    100%{margin-left:-200%;}
}

/* EVENT SLIDER */
.event-section{
    padding:50px 20px;
    text-align:center;
}

.event-slider{
    display:flex;
    overflow:hidden;
    scroll-behavior:smooth;
}

.event-card{
    min-width:300px;
    background:white;
    margin:15px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    overflow:hidden;
}

.event-card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.event-card .content{
    padding:15px;
}

.event-card button{
    background:#F28482;
    border:none;
    padding:8px 15px;
    border-radius:20px;
    color:white;
    cursor:pointer;
}

.slider-btn{
    background:#0F4C5C;
    color:white;
    border:none;
    padding:10px 20px;
    margin:10px;
    border-radius:25px;
    cursor:pointer;
}

/* LOGIN SECTION */
.auth{
    background:#B8F2E6;
    padding:60px 20px;
    text-align:center;
}

.tabs button{
    padding:10px 25px;
    border:none;
    margin:5px;
    border-radius:30px;
    cursor:pointer;
    background:#0F4C5C;
    color:white;
}

.form{
    display:none;
    margin-top:20px;
}

.form input{
    width:250px;
    padding:8px;
    margin:8px;
    border-radius:20px;
    border:1px solid #ccc;
}

.form button{
    padding:10px 20px;
    border:none;
    border-radius:25px;
    background:#F28482;
    color:white;
}

/* RESPONSIVE */
@media(max-width:768px){
    .event-slider{
        flex-direction:column;
        align-items:center;
    }
}

</style>

<script>

/* EVENT SLIDER CONTROL */
function scrollLeftSlider(){
    document.getElementById("eventSlider").scrollLeft -= 320;
}

function scrollRightSlider(){
    document.getElementById("eventSlider").scrollLeft += 320;
}

/* TABS */
function showTab(id){
    document.getElementById("loginForm").style.display="none";
    document.getElementById("signupForm").style.display="none";
    document.getElementById(id).style.display="block";
}

/* Minor Validation Imperfection */
function validateSignup(){
    var pass=document.getElementById("pass").value;

    // Weak rule: only checks length 4
    if(pass.length<4){
        alert("Password too weak");
        return false;
    }

    alert("Account Created Successfully");
    return false;
}

</script>

</head>

<body>

<header>
    <div class="logo">EventGO ✨</div>
    <nav>
        <a href="#">Home</a>
        <a href="#events">Events</a>
        <a href="#loginSection">Login</a>
    </nav>
</header>

<!-- HERO CAROUSEL -->
<section class="carousel">
    <div class="slides">
        <img src="https://images.squarespace-cdn.com/content/v1/5e6542d2ae16460bb741a9eb/5a89c042-5903-4b2e-8b11-81d2b66fd47e/hackathon_ai">
        <img src="images/1.png">
        <img src="https://picsum.photos/1200/350?sports">
    </div>
</section>

<!-- EVENT SLIDER -->
<section id="events" class="event-section">
    <h2>Upcoming Experiences</h2>

    <button class="slider-btn" onclick="scrollLeftSlider()">◀</button>
    <button class="slider-btn" onclick="scrollRightSlider()">▶</button>

    <div id="eventSlider" class="event-slider">

        <div class="event-card">
            <img src="https://media.gettyimages.com/id/2121029847/vector/large-group-of-diverse-people-with-thoughts.jpg?s=612x612&w=gi&k=20&c=dXUvL_pfKUv9oSeAMrqb0q9zc6B8d6BVlqCvWgm1u18=">
            <div class="content">
                <h3>Art & Culture Fair</h3>
                <p>20 Sept 2026 | $25</p>
                <button>Book Now</button>
            </div>
        </div>

        <div class="event-card">
            <img src="https://picsum.photos/400/200?tech">
            <div class="content">
                <h3>Future Tech Expo</h3>
                <p>12 Oct 2026 | $40</p>
                <button>Book Now</button>
            </div>
        </div>

        <div class="event-card">
            <img src="https://images.squarespace-cdn.com/content/v1/5e6542d2ae16460bb741a9eb/5a89c042-5903-4b2e-8b11-81d2b66fd47e/hackathon_ai">
            <div class="content">
                <h3>Street Food Carnival</h3>
                <p>5 Nov 2026 | $20</p>
                <button>Book Now</button>
            </div>
        </div>

        <div class="event-card">
            <img src="https://picsum.photos/400/200?gaming">
            <div class="content">
                <h3>Esports Championship</h3>
                <p>18 Nov 2026 | $35</p>
                <button>Book Now</button>
            </div>
        </div>

    </div>
</section>

<!-- LOGIN SECTION -->
<section id="loginSection" class="auth">

    <h2>Access Your Account</h2>

    <div class="tabs">
        <button onclick="showTab('loginForm')">Login</button>
        <button onclick="showTab('signupForm')">Sign Up</button>
    </div>

    <div id="loginForm" class="form" style="display:block;">
        <input type="text" placeholder="Email">
        <input type="password" placeholder="Password">
        <br>
        <button>Login</button>
    </div>

    <div id="signupForm" class="form">
        <input type="text" placeholder="Full Name">
        <input type="text" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <br>
        <button onclick="validateSignup()">Sign Up</button>
    </div>

</section>

</body>
</html>
